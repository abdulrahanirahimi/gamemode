<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameMode</title>
<style>
/* (Design blijft gelijk voor de snelheid) */
body{font-family:sans-serif;background:#08111f;color:white;margin:0;}
#hero{text-align:center;padding:40px;}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px;padding:20px;}
.card{background:#112;padding:20px;border-radius:10px;cursor:pointer;text-align:center;border:1px solid #224;}
#player{display:none;padding:20px;}
#frame{width:100%;height:85vh;border:none;background:#fff;}
.btn{padding:10px 20px;background:#2f80ff;color:white;border:none;cursor:pointer;border-radius:5px;}
</style>
</head>
<body>

<div id="hero"><h1>GAME.MODE</h1></div>
<div id="grid"></div>

<div id="player">
  <button class="btn" onclick="goBack()">← Terug</button>
  <h2 id="title"></h2>
  <iframe id="frame" allowfullscreen="true" allow="autoplay; fullscreen"></iframe>
</div>

<script>
const games=[
  {title:"Drive Mad",url:"https://games.sbgames.net/drive-mad/"},
  {title:"Flappy Bird",url:"https://nebez.github.io/floppybird/"},
  {title:"2048",url:"https://gabrielecirulli.github.io/2048/"},
  {title:"Snake",url:"https://lorecioni.github.io/snake/"},
  {title:"Dino Game",url:"https://chromedino.com/"}
];

function render(){
  const grid=document.getElementById("grid");
  grid.innerHTML=games.map(g=>`
    <div class="card" onclick="loadGame('${g.url}','${g.title}')">
      <h3>${g.title}</h3>
    </div>
  `).join("");
}

function loadGame(url,title){
  document.getElementById("hero").style.display="none";
  document.getElementById("grid").style.display="none";
  document.getElementById("player").style.display="block";
  document.getElementById("title").textContent=title;
  document.getElementById("frame").src=url;
}

function goBack(){
  document.getElementById("player").style.display="none";
  document.getElementById("hero").style.display="block";
  document.getElementById("grid").style.display="grid";
  document.getElementById("frame").src="";
}

render();
</script>
</body>
</html>
