<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameMode</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:#08111f;color:white;min-height:100vh;position:relative;}

/* ── SERVER LIST KNOP STYLING ── */
.server-list-btn {
  display: inline-block;
  padding: 10px 20px;
  background: #152340;
  color: #2f80ff;
  border-radius: 9px;
  text-decoration: none;
  font-size: 13px;
  font-weight: 500;
  border: 1px solid #1a3a6b;
  transition: .2s;
}
.server-list-btn:hover {
  background: #1e355e;
  color: #fff;
  border-color: #2f80ff;
}

/* ── HERO ── */
#hero{text-align:center;padding:60px 20px 28px;}
#hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(52px,10vw,86px);letter-spacing:5px;line-height:1;margin-bottom:10px;}
#hero span{color:#2f80ff;}
#hero p{font-size:11px;color:#3a5a8a;letter-spacing:2px;text-transform:uppercase;margin-top:8px;}

/* ── CONTROLS ── */
#controls{max-width:800px;margin:0 auto 24px;padding:0 20px;display:flex;gap:10px;justify-content:center;}
#search{width:100%;max-width:420px;padding:12px 16px;border-radius:10px;background:#0d1929;border:1px solid #1a3a6b;color:white;outline:none;font-family:'DM Sans',sans-serif;font-size:14px;transition:border-color .15s;}
#search:focus{border-color:#2f80ff;}
#search::placeholder{color:#3a5a8a;}

/* ── GRID ── */
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;padding:0 20px 40px;max-width:1300px;margin:0 auto;}
.card{background:#0d1929;border:1px solid #172f56;border-radius:14px;padding:22px 20px;cursor:pointer;transition:.2s;text-align:center;}
.card:hover{transform:translateY(-5px);border-color:#2f80ff;box-shadow:0 8px 32px rgba(47,128,255,.2);}
.card.featured{background:linear-gradient(135deg,#0d1929 0%,#071a10 100%);border-color:#1e6b3a;}
.card.featured:hover{border-color:#22c55e;box-shadow:0 8px 32px rgba(34,197,94,.18);}
.emoji{font-size:38px;margin-bottom:10px;}
.card h3{font-size:14px;font-weight:500;color:#c8d8f0;}
.card .tag{display:inline-block;margin-top:6px;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#2f80ff;opacity:.7;}
.card.featured .tag{color:#22c55e;opacity:.9;}

/* ── PLAYER ── */
#player{display:none;padding:20px;max-width:1400px;margin:0 auto;}
.player-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:10px;}
#frame{width:100%;height:78vh;border-radius:14px;border:none;background:#000;}
.btn{padding:10px 22px;background:#2f80ff;color:white;border-radius:9px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;text-decoration:none;cursor:pointer;transition:opacity .15s;}
.btn:hover{opacity:.85;}
.btn-back{background:#152340;}
.btn-fs{background:#152340;font-size:16px;padding:10px 16px;}
#player-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:#f0f6ff;}
</style>
</head>
<body>

<div id="hero">
  <h1>GAME<span>.</span>MODE</h1>
  <p>20 games — allemaal gratis &amp; direct speelbaar</p>
</div>

<div id="controls">
  <input id="search" placeholder="Zoek een game..." oninput="filter()">
</div>

<div id="grid"></div>

<div id="player">
  <div class="player-nav">
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="btn btn-back" onclick="goBack()">← Terug</button>
      <a id="eagler-server-btn" href="https://servers.eaglercraft.com/" target="_blank" class="server-list-btn" style="display:none;">Server list ↗</a>
    </div>
    
    <span id="player-title">Game</span>
    
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="btn btn-fs" onclick="goFullscreen()" title="Volledig scherm">⛶</button>
      <a id="externalLink" href="#" target="_blank" class="btn">Open in nieuw tabblad ↗</a>
    </div>
  </div>
  <iframe id="frame"
    allowfullscreen="true"
    allow="fullscreen; autoplay; pointer-lock">
  </iframe>
</div>

<script>
/* ──────────────────────────────────────────────────────────────────
   GAME LIST
   ────────────────────────────────────────────────────────────────── */
const games = [
  // ── Minecraft ────────────────────────────────────────────────────
  { title: "Eaglercraft",    emoji: "⛏️", tag: "Minecraft",  featured: true,
    url: "https://eaglercrft.netlify.app/" },

  // ── Sport ────────────────────────────────────────────────────────
  { title: "Penalty Shooters 2", emoji: "⚽", tag: "Sport",
    url: "https://ubg77.github.io/edit/penalty-shooters-2/" },

  // ── Arcade ───────────────────────────────────────────────────────
  { title: "Drive Mad",      emoji: "🚙", tag: "Arcade",
    url: "https://lnahtml.github.io/a77/drive-mad/" },
  { title: "Pac-Man",        emoji: "👾", tag: "Arcade",
    url: "https://binbashbanana.github.io/gfiles/gfiles/html5/pacman/" },
  { title: "Asteroids",      emoji: "🚀", tag: "Arcade",
    url: "https://binbashbanana.github.io/gfiles/gfiles/html5/asteroids/" },
  { title: "Space Huggers",  emoji: "🛸", tag: "Arcade",
    url: "https://binbashbanana.github.io/gfiles/gfiles/html5/spacehuggers/" },
  { title: "Flappy Bird",    emoji: "🐦", tag: "Arcade",
    url: "https://nebez.github.io/floppybird/" },

  // ── Puzzel ───────────────────────────────────────────────────────
  { title: "2048",           emoji: "🔢", tag: "Puzzel",
    url: "https://gabrielecirulli.github.io/2048/" },
  { title: "Tetris",         emoji: "🟦", tag: "Puzzel",
    url: "https://binbashbanana.github.io/gfiles/gfiles/html5/tetris/" },
  { title: "Hextris",        emoji: "🔷", tag: "Puzzel",
    url: "https://binbashbanana.github.io/gfiles/gfiles/html5/hextris/" },
  { title: "Breakout",       emoji: "🧱", tag: "Puzzel",
    url: "https://binbashbanana.github.io/gfiles/gfiles/html5/breakout/" },

  // ── Klassiek ─────────────────────────────────────────────────────
  { title: "Snake",          emoji: "🐍", tag: "Klassiek",
    url: "https://binbashbanana.github.io/gfiles/gfiles/html5/snake/" },
  { title: "Dino Game",      emoji: "🦕", tag: "Klassiek",
    url: "https://binbashbanana.github.io/gfiles/gfiles/html5/chromedino/" },
  { title: "Chess",          emoji: "♟️", tag: "Klassiek",
    url: "https://binbashbanana.github.io/gfiles/gfiles/html5/chess/" },
  { title: "Minesweeper",    emoji: "💣", tag: "Klassiek",
    url: "https://minesweeper.github.io/" },

  // ── Runner ───────────────────────────────────────────────────────
  { title: "Run 3",          emoji: "🏃", tag: "Runner",
    url: "https://binbashbanana.github.io/gfiles/gfiles/html5/run3/" },
  { title: "Geometry Dash",  emoji: "🎮", tag: "Runner",
    url: "https://binbashbanana.github.io/gfiles/gfiles/html5/geometrydash/" },

  // ── Idle ─────────────────────────────────────────────────────────
  { title: "Cookie Clicker", emoji: "🍪", tag: "Idle",
    url: "https://binbashbanana.github.io/gfiles/gfiles/html5/cookieclicker/" },
  { title: "A Dark Room",    emoji: "🕯️", tag: "Idle",
    url: "https://binbashbanana.github.io/gfiles/gfiles/html5/adarkroom/" },

  // ── Simulatie ────────────────────────────────────────────────────
  { title: "Sandboxels",     emoji: "🧪", tag: "Simulatie",
    url: "https://sandboxels.r74n.com/" },
];

/* ── Render ── */
function render(list) {
  document.getElementById("grid").innerHTML = list.map(g => `
    <div class="card${g.featured ? " featured" : ""}"
         onclick='play(${JSON.stringify(g.url)}, ${JSON.stringify(g.title)})'>
      <div class="emoji">${g.emoji}</div>
      <h3>${g.title}</h3>
      <span class="tag">${g.tag}</span>
    </div>
  `).join("");
}

/* ── Play / back ── */
function setHomeVisible(v) {
  const d = v ? "" : "none";
  document.getElementById("hero").style.display         = d;
  document.getElementById("controls").style.display     = v ? "flex" : "none";
  document.getElementById("grid").style.display         = v ? "grid" : "none";
}

function play(url, title) {
  setHomeVisible(false);
  document.getElementById("player").style.display       = "block";
  document.getElementById("player-title").textContent   = title;
  
  // Toon Server lijst knop alleen als de geopende game Eaglercraft is
  if (title.toLowerCase().includes("eaglercraft")) {
    document.getElementById("eagler-server-btn").style.display = "inline-block";
  } else {
    document.getElementById("eagler-server-btn").style.display = "none";
  }
  
  const frame = document.getElementById("frame");
  frame.src = url;
  document.getElementById("externalLink").href = url;
  
  setTimeout(() => {
    frame.focus();
  }, 500);
}

function goBack() {
  document.getElementById("frame").src                  = "";
  document.getElementById("player").style.display       = "none";
  setHomeVisible(true);
}

function goFullscreen() {
  const frame = document.getElementById("frame");
  if      (frame.requestFullscreen)            frame.requestFullscreen();
  else if (frame.webkitRequestFullscreen)      frame.webkitRequestFullscreen();
  else if (frame.mozRequestFullScreen)         frame.mozRequestFullScreen();
}

/* ── Search ── */
function filter() {
  const q = document.getElementById("search").value.toLowerCase();
  render(games.filter(g =>
    g.title.toLowerCase().includes(q) || g.tag.toLowerCase().includes(q)
  ));
}

// Initial Run
render(games);
</script>
</body>
</html>
