<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameMode</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:#08111f;color:white;min-height:100vh;}

/* ── HERO ── */
#hero{text-align:center;padding:48px 20px 28px;}
#hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(52px,10vw,86px);letter-spacing:5px;line-height:1;margin-bottom:10px;}
#hero span{color:#2f80ff;}

/* ── CONTROLS ── */
#controls{max-width:800px;margin:0 auto 24px;padding:0 20px;display:flex;gap:10px;justify-content:center;}
#search{width:100%;max-width:400px;padding:12px 16px;border-radius:10px;background:#0d1929;border:1px solid #1a3a6b;color:white;outline:none;}

/* ── GRID ── */
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;padding:0 20px 40px;max-width:1300px;margin:0 auto;}
.card{background:#0d1929;border:1px solid #172f56;border-radius:14px;padding:20px;cursor:pointer;transition:.2s;text-align:center;}
.card:hover{transform:translateY(-5px);border-color:#2f80ff;box-shadow:0 8px 32px rgba(47,128,255,.2);}
.emoji{font-size:40px;margin-bottom:10px;}

/* ── PLAYER ── */
#player{display:none;padding:20px;max-width:1300px;margin:0 auto;}
.player-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
#frame{width:100%;height:75vh;border-radius:14px;border:none;background:#000;}
.btn{padding:12px 24px;background:#2f80ff;color:white;border-radius:9px;text-decoration:none;font-weight:bold;cursor:pointer;}
</style>
</head>
<body>

<div id="hero"><h1>GAME<span>.</span>MODE</h1></div>
<div id="controls"><input id="search" placeholder="Zoek games..." oninput="filter()"></div>
<div id="grid"></div>

<div id="player">
  <div class="player-nav">
    <button class="btn" style="background:#444" onclick="goBack()">← Terug</button>
    <h2 id="title">Game</h2>
    <a id="externalLink" href="#" target="_blank" class="btn">Open in Nieuw Tabblad ↗</a>
  </div>
  <iframe id="frame" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
</div>

<script>
const games=[
  {title:"Drive Mad",emoji:"🚙",url:"https://fancade.com/drivemad/"},
  {title:"Flappy Bird",emoji:"🐦",url:"https://nebez.github.io/floppybird/"},
  {title:"2048",emoji:"🔢",url:"https://gabrielecirulli.github.io/2048/"},
  {title:"Snake",emoji:"🐍",url:"https://lorecioni.github.io/snake/"},
  {title:"Tetris",emoji:"🟦",url:"https://chvin.github.io/react-tetris/"},
  {title:"Dino Game",emoji:"🦕",url:"https://chromedino.com/"}
];

function render(list){
  const grid=document.getElementById("grid");
  grid.innerHTML=list.map(g=>`
    <div class="card" onclick="play('${g.url}','${g.title}')">
      <div class="emoji">${g.emoji}</div>
      <h3>${g.title}</h3>
    </div>
  `).join("");
}

function play(url,title){
  document.getElementById("hero").style.display="none";
  document.getElementById("controls").style.display="none";
  document.getElementById("grid").style.display="none";
  document.getElementById("player").style.display="block";
  document.getElementById("title").textContent=title;
  document.getElementById("frame").src=url;
  document.getElementById("externalLink").href=url;
}

function goBack(){
  document.getElementById("player").style.display="none";
  document.getElementById("hero").style.display="block";
  document.getElementById("controls").style.display="flex";
  document.getElementById("grid").style.display="grid";
  document.getElementById("frame").src="";
}

function filter(){
  const q=document.getElementById("search").value.toLowerCase();
  render(games.filter(g=>g.title.toLowerCase().includes(q)));
}

render(games);
</script>
</body>
</html>
