<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameMode</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:#08111f;color:white;min-height:100vh;}
#hero{text-align:center;padding:48px 20px 28px;}
#hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(52px,10vw,86px);letter-spacing:5px;line-height:1;}
#hero span{color:#2f80ff;}
#hero p{color:#6a9cda;text-transform:uppercase;letter-spacing:3px;font-size:13px;margin-top:6px;}
#controls{max-width:800px;margin:0 auto 24px;padding:0 20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
#search{flex:1;min-width:180px;padding:12px 16px;border:1px solid #1a3a6b;border-radius:10px;background:#0d1929;color:white;font-size:15px;outline:none;}
#search:focus{border-color:#2f80ff;}
.genre-btn{padding:8px 14px;border-radius:8px;border:1px solid #1a3a6b;background:#0d1929;color:#7aa8e0;font-size:13px;cursor:pointer;}
.genre-btn:hover,.genre-btn.active{background:#1a3a6b;color:white;border-color:#2f80ff;}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;padding:0 20px 40px;max-width:1300px;margin:0 auto;}
.card{background:#0d1929;border:1px solid #172f56;border-radius:14px;overflow:hidden;cursor:pointer;transition:.18s;}
.card:hover{transform:translateY(-5px);border-color:#2f80ff;box-shadow:0 8px 32px rgba(47,128,255,.18);}
.card-thumb{width:100%;height:130px;display:flex;align-items:center;justify-content:center;font-size:52px;}
.info{padding:12px 14px 14px;}
.title{font-weight:600;font-size:15px;margin-bottom:4px;}
.genre{color:#5a8dcb;font-size:12px;text-transform:uppercase;letter-spacing:1px;}
#player{display:none;padding:16px 20px 32px;max-width:1300px;margin:0 auto;}
.player-header{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.btn{background:#2f80ff;color:white;border:none;padding:10px 18px;border-radius:9px;cursor:pointer;text-decoration:none;font-weight:500;}
.btn-outline{background:transparent;border:1px solid #2f80ff;color:#2f80ff;}
#frame{width:100%;height:80vh;border:none;border-radius:14px;background:#000;display:block;}
</style>
</head>
<body>

<div id="hero"><h1>GAME<span>.</span>MODE</h1></div>
<div id="controls">
  <input id="search" placeholder="Search games…" oninput="filterGames()">
  <button class="genre-btn active" onclick="setGenre('All',this)">All</button>
  <button class="genre-btn" onclick="setGenre('Arcade',this)">Arcade</button>
</div>

<div id="grid"></div>

<div id="player">
  <div class="player-header">
    <button class="btn btn-outline" onclick="goBack()">← Back</button>
    <div id="gameTitle"></div>
    <a id="openTabBtn" href="#" target="_blank" rel="noopener" class="btn">Open in New Tab ↗</a>
  </div>
  <iframe id="frame" allowfullscreen allow="fullscreen" sandbox="allow-scripts allow-same-origin allow-forms allow-pointer-lock allow-downloads"></iframe>
</div>

<script>
const games=[
  // Geüpdatete Drive Mad link naar een stabielere bron
  {title:"Drive Mad",genre:"Arcade",emoji:"🚙",url:"https://games.crazygames.com/en_US/drive-mad/index.html"},
  {title:"Flappy Bird",genre:"Arcade",emoji:"🐦",url:"https://nebez.github.io/floppybird/"},
  {title:"2048",genre:"Puzzle",emoji:"🔢",url:"https://gabrielecirulli.github.io/2048/"},
  {title:"Snake",genre:"Arcade",emoji:"🐍",url:"https://lorecioni.github.io/snake/"},
  {title:"Tetris",genre:"Puzzle",emoji:"🟦",url:"https://chvin.github.io/react-tetris/"},
  {title:"Hextris",genre:"Arcade",emoji:"🔺",url:"https://hextris.io/"},
  {title:"Dino Game",genre:"Arcade",emoji:"🦕",url:"https://chromedino.com/"},
  {title:"Sudoku",genre:"Puzzle",emoji:"🔷",url:"https://mcronberg.github.io/soduku/"},
  {title:"Cookie Clicker",genre:"Strategy",emoji:"🍪",url:"https://orteil.dashnet.org/cookieclicker/"},
  {title:"Trimps",genre:"Strategy",emoji:"🧬",url:"https://trimps.github.io/"},
  {title:"Space Company",genre:"Strategy",emoji:"🚀",url:"https://sparticle999.github.io/SpaceCompany/"},
  {title:"Tic Tac Toe",genre:"Puzzle",emoji:"❌",url:"https://richardshaju.github.io/tictactoe/"}
];

function render(list){
  const grid=document.getElementById("grid");
  grid.innerHTML=list.map(g=>`
    <div class="card" onclick="playGame('${g.url}','${g.title}')">
      <div class="card-thumb">${g.emoji}</div>
      <div class="info"><div class="title">${g.title}</div><div class="genre">${g.genre}</div></div>
    </div>
  `).join("");
}

function playGame(url,title){
  document.getElementById("hero").style.display="none";
  document.getElementById("controls").style.display="none";
  document.getElementById("grid").style.display="none";
  document.getElementById("player").style.display="block";
  document.getElementById("gameTitle").textContent=title;
  document.getElementById("openTabBtn").href=url;
  document.getElementById("frame").src=url;
}

function goBack(){
  document.getElementById("player").style.display="none";
  document.getElementById("hero").style.display="block";
  document.getElementById("controls").style.display="flex";
  document.getElementById("grid").style.display="grid";
}

render(games);
</script>
</body>
</html>
