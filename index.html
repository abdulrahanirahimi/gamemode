<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameMode</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#08111f;color:#eef6ff}
#hero{padding:2.5rem 1rem 1.2rem;text-align:center}
#hero h1{font-family:'Bebas Neue',sans-serif;font-size:64px;letter-spacing:4px}
#hero h1 span{color:#2f80ff}
#hero p{font-size:11px;color:#7fa7e6;letter-spacing:2px;text-transform:uppercase}
#searchbar{display:flex;gap:8px;padding:0 1rem;max-width:700px;margin:auto}
#search{flex:1;padding:12px 16px;border-radius:10px;border:1px solid #1d3f73;background:#0f1b2e;color:white}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;padding:20px}
.card{background:#0f1b2e;border:1px solid #173867;border-radius:12px;overflow:hidden;cursor:pointer;transition:.2s}
.card:hover{transform:translateY(-4px);border-color:#2f80ff}
.card img{width:100%;aspect-ratio:16/9;object-fit:cover}
.info{padding:10px}
.title{font-weight:600}
.genre{font-size:12px;color:#8eb4f5;margin-top:4px}
#player{display:none;padding:20px}
#frame{width:100%;height:80vh;border:none;border-radius:12px;background:#000}
.btn{padding:10px 16px;border:none;border-radius:8px;background:#2f80ff;color:white;cursor:pointer}
</style>
</head>
<body>
<div id="hero">
<h1>GAME<span>.</span>MODE</h1>
<p>Play Browser Games Instantly</p>
</div>

<div id="searchbar">
<input id="search" placeholder="Search games..." oninput="filterGames()">
</div>

<div id="grid"></div>

<div id="player">
<button class="btn" onclick="goBack()">← Back</button>
<h2 id="gameTitle" style="margin:12px 0"></h2>
<iframe id="frame" allowfullscreen></iframe>
</div>

<script>
const games=[
{title:"Drive Mad",genre:"Puzzle",image:"https://picsum.photos/400/225?1",url:"https://play.fancade.com/5F084A0BCE06B7103Fmaxw999999maxh9999999istart1//"},
{title:"Hextris",genre:"Arcade",image:"https://picsum.photos/400/225?2",url:"https://hextris.io/"},
{title:"Cookie Clicker",genre:"Idle",image:"https://picsum.photos/400/225?3",url:"https://orteil.dashnet.org/cookieclicker/"},
{title:"Tetris",genre:"Classic",image:"https://picsum.photos/400/225?4",url:"https://tetris.com/play-tetris"},
{title:"Slope",genre:"Runner",image:"https://picsum.photos/400/225?5",url:"https://slopegame.io/"}
];

function render(list){
const grid=document.getElementById('grid');
grid.innerHTML='';
list.forEach(g=>{
grid.innerHTML+=`
<div class="card" onclick="playGame('${g.url}','${g.title}')">
<img src="${g.image}" alt="">
<div class="info">
<div class="title">${g.title}</div>
<div class="genre">${g.genre}</div>
</div>
</div>`;
});
}

function filterGames(){
const q=document.getElementById('search').value.toLowerCase();
render(games.filter(g=>g.title.toLowerCase().includes(q)));
}

function playGame(url,title){
document.getElementById('grid').style.display='none';
document.getElementById('searchbar').style.display='none';
document.getElementById('hero').style.display='none';
document.getElementById('player').style.display='block';
document.getElementById('frame').src=url;
document.getElementById('gameTitle').textContent=title;
}

function goBack(){
document.getElementById('player').style.display='none';
document.getElementById('grid').style.display='grid';
document.getElementById('searchbar').style.display='flex';
document.getElementById('hero').style.display='block';
document.getElementById('frame').src='';
}

render(games);
</script>
</body>
</html>
